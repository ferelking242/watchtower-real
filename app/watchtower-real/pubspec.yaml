name: watchtower_real
description: Watchtower Real Feed — TikTok-style vertical content feed powered by the Watchtower remote API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────────────
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.0

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^17.2.0

  # ── Network ─────────────────────────────────────────────────────────────────
  http: ^1.6.0

  # ── Storage ─────────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI ──────────────────────────────────────────────────────────────────────
  flex_color_scheme: ^8.3.1
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.0+1
  cupertino_icons: ^1.0.9

  # ── Video (inline feed player; MPV full-screen via Watchtower intent) ────────
  video_player: ^2.9.2

  # ── Marquee (son name ticker) ────────────────────────────────────────────────
  marquee: ^2.2.3

  # ── Shimmer loading ──────────────────────────────────────────────────────────
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
