version: '3.9'

services:
  watchtower-server:
    build: .
    image: watchtower-server:latest
    container_name: watchtower-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_KEY=${API_KEY:-changeme}
      - EXTENSIONS_REPO_URL=${EXTENSIONS_REPO_URL:-https://raw.githubusercontent.com/kodjodevf/mangayomi-extensions/main}
      - CACHE_TTL_MS=${CACHE_TTL_MS:-300000}
      - RATE_WINDOW_MS=${RATE_WINDOW_MS:-60000}
      - RATE_MAX_TOKENS=${RATE_MAX_TOKENS:-60}
    volumes:
      - watchtower-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  watchtower-data:
