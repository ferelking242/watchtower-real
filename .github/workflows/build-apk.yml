name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64-v8a
            target: android-arm64
          - label: x86_64
            target: android-x64

    defaults:
      run:
        working-directory: app/watchtower-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/watchtower-real/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/watchtower-real/android/**/*.gradle*', 'app/watchtower-real/pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate keystore
        working-directory: app/watchtower-real/android/app
        run: |
          keytool -genkey -v \
            -keystore watchtower-debug.keystore \
            -alias watchtower -keyalg RSA -keysize 2048 -validity 10000 \
            -storetype PKCS12 -storepass watchtower -keypass watchtower \
            -dname "CN=Watchtower,O=Watchtower,C=US"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK — ${{ matrix.label }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dhttp.keepAlive=false"
        run: |
          flutter build apk \
            --profile \
            --target-platform ${{ matrix.target }} \
            --split-per-abi

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          APK="build/app/outputs/flutter-apk/app-${{ matrix.label }}-profile.apk"
          [ -f "$APK" ] || { echo "ERROR: not found"; ls build/app/outputs/flutter-apk/ || true; exit 1; }
          cp "$APK" "artifacts/watchtower-real-${{ matrix.label }}.apk"
          echo "APK: $(du -sh artifacts/watchtower-real-${{ matrix.label }}.apk)"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.label }}
          path: app/watchtower-real/artifacts/watchtower-real-${{ matrix.label }}.apk
          retention-days: 14
