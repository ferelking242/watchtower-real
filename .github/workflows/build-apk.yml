name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android (arm64-v8a)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/watchtower-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/watchtower-real/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/watchtower-real/android/**/*.gradle*', 'app/watchtower-real/pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Keystore permanent (KEYSTORE_BASE64 secret GitHub) ─────────────────
      - name: Decode keystore
        working-directory: app/watchtower-real/android/app
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > reel.keystore
            echo "KEYSTORE_PATH=$PWD/reel.keystore" >> $GITHUB_ENV
            echo "✓ Keystore permanent décodé"
          else
            echo "⚠ KEYSTORE_BASE64 absent — génération d'un keystore de secours"
            keytool -genkey -v \
              -keystore reel.keystore \
              -alias reel -keyalg RSA -keysize 2048 -validity 36500 \
              -storetype PKCS12 \
              -storepass "${KEY_PASSWORD:-reelwatchtower}" \
              -keypass "${KEY_PASSWORD:-reelwatchtower}" \
              -dname "CN=Reel,O=Watchtower,C=US"
            echo "KEYSTORE_PATH=$PWD/reel.keystore" >> $GITHUB_ENV
          fi
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK — arm64-v8a (release)
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS || 'reel' }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD || 'reelwatchtower' }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'reelwatchtower' }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dhttp.keepAlive=false"
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          [ -f "$APK" ] || {
            echo "ERROR: APK not found at $APK"
            ls build/app/outputs/flutter-apk/ 2>/dev/null || true
            exit 1
          }
          cp "$APK" "artifacts/reel-arm64-v8a.apk"
          echo "APK: $(du -sh artifacts/reel-arm64-v8a.apk)"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: app/watchtower-real/artifacts/reel-arm64-v8a.apk
          retention-days: 14
