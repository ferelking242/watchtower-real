name: Build APK (Reel)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Keystore
        working-directory: android/app
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > reel.keystore
            echo "KEYSTORE_PATH=$PWD/reel.keystore" >> $GITHUB_ENV
          else
            keytool -genkey -v \
              -keystore reel.keystore -alias reel \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storetype PKCS12 \
              -storepass reelwatchtower -keypass reelwatchtower \
              -dname "CN=Reel,O=Watchtower,C=US"
            echo "KEYSTORE_PATH=$PWD/reel.keystore" >> $GITHUB_ENV
          fi
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: pub get
        run: flutter pub get

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS || 'reel' }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD || 'reelwatchtower' }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'reelwatchtower' }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Collect
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/reel-arm64-v8a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: artifacts/reel-arm64-v8a.apk
          retention-days: 14
