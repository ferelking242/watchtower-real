name: Build IPA (TrollStore)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: iOS IPA (TrollStore)
    runs-on: macos-14

    defaults:
      run:
        working-directory: app/watchtower-real

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/watchtower-real/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      # ── Génère ios/ et patche immédiatement le signing (Xcode 15/16 fix) ───
      - name: Create iOS project + patch signing
        run: |
          flutter create --platforms=ios .

          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # 1. Patch project.pbxproj : désactive automatic signing + vide team
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' \
            "$PBXPROJ" 2>/dev/null || true

          echo "✓ pbxproj patché :"
          grep -E 'DEVELOPMENT_TEAM|ProvisioningStyle' "$PBXPROJ" | head -6

          # 2. Patch Podfile : ajoute CODE_SIGNING_ALLOWED = NO pour tous les pods
          #    (le Podfile généré a déjà un post_install avec flutter_additional_ios_build_settings)
          ruby -e "
            content = File.read('ios/Podfile')
            patch = content.gsub(
              'flutter_additional_ios_build_settings(target)',
              %{flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED']  = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['DEVELOPMENT_TEAM']      = ''
                end}
            )
            File.write('ios/Podfile', patch)
            puts '✓ Podfile patché'
          "

      # ── ATS : autorise HTTP local (serveur Watchtower embarqué) ─────────────
      - name: Allow HTTP for local server (ATS patch)
        run: |
          PLIST="ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict"                        "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true"  "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" "$PLIST" 2>/dev/null || true
          echo "ATS patch OK :"
          /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity" "$PLIST"

      # ── Build iOS sans codesign ─────────────────────────────────────────────
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=none
          echo "Build terminé."
          ls -lh build/ios/iphoneos/ 2>/dev/null || true

      # ── Packaging IPA (TrollStore) ──────────────────────────────────────────
      - name: Package IPA (TrollStore)
        run: |
          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found"
            find build/ -name "*.app" 2>/dev/null | head -10
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr reel.ipa Payload
          echo "IPA: $(du -sh reel.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-trollstore
          path: app/watchtower-real/reel.ipa
          retention-days: 14
