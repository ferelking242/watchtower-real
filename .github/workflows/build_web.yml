name: Build Flutter Web

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      # NOTE: .dart_tool intentionally excluded from cache.
      # Caching it (even with a content-hash key) caused stale kernel/snapshot reuse
      # on restore-keys partial matches, silently keeping old Dart code in the web bundle.
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-web-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-web-

      - name: Patch pubspec with web stubs
        run: |
          python3 << 'PYEOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          stubs = {
              'media_kit':                  'web_stubs/media_kit',
              'media_kit_video':            'web_stubs/media_kit_video',
              'media_kit_libs_video':       'web_stubs/media_kit_libs_video',
              'volume_controller':          'web_stubs/volume_controller',
              'screen_brightness':          'web_stubs/screen_brightness',
              'wakelock_plus':              'web_stubs/wakelock_plus',
              'local_notifier':             'web_stubs/local_notifier',
              'tray_manager':               'web_stubs/tray_manager',
              'titlebar_buttons':           'web_stubs/titlebar_buttons',
              'smtc_windows':               'web_stubs/smtc_windows',
              'home_widget':                'web_stubs/home_widget',
              'metadata_god':               'web_stubs/metadata_god',
              'flutter_new_pipe_extractor':  'web_stubs/flutter_new_pipe_extractor',
              'sqlite3_flutter_libs':        'web_stubs/sqlite3_flutter_libs',
              'ffi':                         'web_stubs/ffi',
              'sqlite3':                     'web_stubs/sqlite3',
          }
          dep_start = next((i for i, l in enumerate(lines) if l.rstrip() == 'dependency_overrides:'), None)
          if dep_start is None:
              lines.append('\ndependency_overrides:\n')
              dep_start = len(lines) - 1
          i = dep_start + 1
          while i < len(lines):
              line = lines[i]
              if line.strip() and not line.startswith(' ') and not line.startswith('\t'):
                  break
              removed = False
              for pkg in stubs:
                  key_match = re.match(r'  ' + re.escape(pkg) + r':(\s*\S.*)?$', line.rstrip('\n'))
                  if key_match:
                      # Single-line entry, e.g. "  ffi: ^2.1.3" — pop just this line.
                      if key_match.group(1):
                          lines.pop(i)
                      else:
                          # Multi-line block entry, e.g. a git dependency:
                          #   media_kit:
                          #     git:
                          #       url: ...
                          # Remove the key line plus every following line that is
                          # indented deeper than it (the whole nested block).
                          block_end = i + 1
                          while block_end < len(lines):
                              next_line = lines[block_end]
                              if next_line.strip() and len(next_line) - len(next_line.lstrip(' ')) <= 2:
                                  break
                              block_end += 1
                          del lines[i:block_end]
                      removed = True
                      break
              if not removed:
                  i += 1
          file_content = ''.join(lines)
          to_add = []
          for pkg, stub_path in stubs.items():
              if f'  {pkg}:\n    path: {stub_path}' not in file_content:
                  to_add.append(f'  {pkg}:\n    path: {stub_path}\n')
          for item in reversed(to_add):
              lines.insert(dep_start + 1, item)
          with open('pubspec.yaml', 'w') as f:
              f.writelines(lines)
          print(f'Added {len(to_add)} stubs to dependency_overrides')
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Patch isar integer literals for dart2js
        run: |
          python3 << 'PYEOF'
          import re, glob
          pattern = re.compile(r'\b\d{16,}\b')
          count = 0
          for path in glob.glob('lib/**/*.dart', recursive=True):
              try:
                  with open(path) as f:
                      content = f.read()
                  if pattern.search(content):
                      new_content = pattern.sub('0', content)
                      with open(path, 'w') as f:
                          f.write(new_content)
                      print(f'Patched: {path}')
                      count += 1
              except Exception as e:
                  print(f'Error: {path}: {e}')
          print(f'Total isar files patched: {count}')
          PYEOF

      - name: Patch dart:ffi files in pub-cache
        run: |
          python3 << 'PYEOF'
          import os, glob
          pub_cache = os.path.expanduser('~/.pub-cache/hosted/pub.dev')
          patterns = [
              f'{pub_cache}/sqlite3-*/lib/src/ffi/**/*.dart',
              f'{pub_cache}/sqlite3-*/lib/open.dart',
              f'{pub_cache}/drift-*/lib/src/sqlite3/database_tracker.dart',
          ]
          stub = '// Web build stub\n'
          count = 0
          for pattern in patterns:
              for path in glob.glob(pattern, recursive=True):
                  with open(path, 'w') as f:
                      f.write(stub)
                  print(f'Stubbed: {os.path.basename(path)}')
                  count += 1
          drift_stub = ('// Web stub\n'
              'import \'package:drift/drift.dart\';\n'
              'class NativeDatabase {\n'
              '  static dynamic open(dynamic f, {dynamic setup, bool logStatements=false}) => throw UnimplementedError();\n'
              '  static dynamic inMemory({dynamic setup}) => throw UnimplementedError();\n'
              '  static dynamic createInBackground(dynamic f, {dynamic setup, bool logStatements=false, String? cacheName}) => throw UnimplementedError();\n'
              '}\n')
          for path in glob.glob(f'{pub_cache}/drift-*/lib/native.dart'):
              with open(path, 'w') as f:
                  f.write(drift_stub)
              print(f'Stubbed drift: {os.path.basename(path)}')
              count += 1
          print(f'Total stubbed: {count} files')
          PYEOF

      - name: Patch pseudom CSSParser for dart2js
        run: |
          FILE=$(find ~/.pub-cache -name 'CSSParser.dart' -path '*/pseudom*' 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/& -3765256679076942294/& 0/g' "$FILE"
            sed -i 's/& 4626330031550017026/& 0/g' "$FILE"
            sed -i 's/& 5779244251887978624/& 0/g' "$FILE"
            sed -i 's/& -4597022382133018102/& 0/g' "$FILE"
            sed -i 's/& -4022278413737085706/& 0/g' "$FILE"
            echo 'Patched CSSParser.dart'
          fi

      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          cp vercel.json build/web/vercel.json
          cd build/web
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/vout.txt
          grep -Eo 'https://[^ ]+\.vercel\.app' /tmp/vout.txt | tail -1 || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify ntfy (build FAILED)
        if: failure()
        run: |
          curl -s -X POST https://ntfy.sh/watchtower \
            -H "Title: Build Web FAIL" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light" \
            -d "Web build FAILED — sha ${{ github.sha }} — ${{ github.event.head_commit.message }}" || true
