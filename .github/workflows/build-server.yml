name: Build & Publish Server

on:
  push:
    branches: [main, master]
    paths:
      - 'app/watchtower/server/**'
      - '.github/workflows/build-server.yml'
  pull_request:
    paths:
      - 'app/watchtower/server/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/watchtower-server

jobs:
  # ── Smoke test ───────────────────────────────────────────────────────────────
  test:
    name: Smoke test (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/watchtower/server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/watchtower/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check server.js
          node --check src/api.js
          node --check src/js-runtime.js
          node --check src/extension-registry.js
          node --check src/rate-limiter.js
          node --check src/bridges/http-bridge.js
          node --check src/bridges/dom-bridge.js
          node --check src/bridges/crypto-bridge.js
          node --check src/bridges/prefs-bridge.js

      - name: Ping test
        run: |
          PORT=18080 node server.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:18080/api/ping | grep '"ok"'
          kill $SERVER_PID

  # ── Docker build & push ──────────────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app/watchtower/server
          file: app/watchtower/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
