name: Build & Deploy Flutter Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # NOTE: .dart_tool intentionally excluded from cache.
      # Caching it (even with a content-hash key) caused stale kernel/snapshot reuse
      # on restore-keys partial matches, silently keeping old Dart code in the web bundle.
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-web-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-web-

      - name: Patch pubspec with web stubs
        run: |
          python3 << 'PYEOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          stubs = {
              'media_kit':                  'web_stubs/media_kit',
              'media_kit_video':            'web_stubs/media_kit_video',
              'media_kit_libs_video':       'web_stubs/media_kit_libs_video',
              'volume_controller':          'web_stubs/volume_controller',
              'screen_brightness':          'web_stubs/screen_brightness',
              'wakelock_plus':              'web_stubs/wakelock_plus',
              'local_notifier':             'web_stubs/local_notifier',
              'tray_manager':               'web_stubs/tray_manager',
              'titlebar_buttons':           'web_stubs/titlebar_buttons',
              'smtc_windows':               'web_stubs/smtc_windows',
              'home_widget':                'web_stubs/home_widget',
              'metadata_god':               'web_stubs/metadata_god',
              'flutter_new_pipe_extractor':  'web_stubs/flutter_new_pipe_extractor',
              'sqlite3_flutter_libs':        'web_stubs/sqlite3_flutter_libs',
              'ffi':                         'web_stubs/ffi',
              'sqlite3':                     'web_stubs/sqlite3',
              'just_zstd':                   'web_stubs/just_zstd',
              'excel':                        'web_stubs/excel',
              'excel2003':                    'web_stubs/excel2003',
              'docx_to_text':                'web_stubs/docx_to_text',
              'ftpconnect':                   'web_stubs/ftpconnect',
              'sqflite':                      'web_stubs/sqflite',
              'dart_lz4':                    'web_stubs/dart_lz4',
              'receive_sharing_intent':       'web_stubs/receive_sharing_intent',
              'open_filex':                   'web_stubs/open_filex',
              'flutter_avif':                'web_stubs/flutter_avif',
              'flutter_avif_android':        'web_stubs/flutter_avif_android',
              'flutter_avif_platform_interface': 'web_stubs/flutter_avif_platform_interface',
              'dartssh2':                     'web_stubs/dartssh2',
              'on_audio_query':               'web_stubs/on_audio_query',
              'on_audio_query_platform_interface': 'web_stubs/on_audio_query_platform_interface',
              'local_auth':                      'web_stubs/local_auth',
              'window_manager':                  'web_stubs/window_manager',
              'desktop_webview_window':          'web_stubs/desktop_webview_window',
              'flutter_discord_rpc_fork':        'web_stubs/flutter_discord_rpc_fork',
          }
          dep_start = next((i for i, l in enumerate(lines) if l.rstrip() == 'dependency_overrides:'), None)
          if dep_start is None:
              lines.append('\ndependency_overrides:\n')
              dep_start = len(lines) - 1
          i = dep_start + 1
          while i < len(lines):
              line = lines[i]
              if line.strip() and not line.startswith(' ') and not line.startswith('\t'):
                  break
              removed = False
              for pkg in stubs:
                  key_match = re.match(r'  ' + re.escape(pkg) + r':(\s*\S.*)?$', line.rstrip('\n'))
                  if key_match:
                      if key_match.group(1):
                          lines.pop(i)
                      else:
                          block_end = i + 1
                          while block_end < len(lines):
                              next_line = lines[block_end]
                              if next_line.strip() and len(next_line) - len(next_line.lstrip(' ')) <= 2:
                                  break
                              block_end += 1
                          del lines[i:block_end]
                      removed = True
                      break
              if not removed:
                  i += 1
          insert_at = dep_start + 1
          stub_lines = []
          for pkg, path in stubs.items():
              stub_lines.append(f'  {pkg}:\n')
              stub_lines.append(f'    path: {path}\n')
          lines[insert_at:insert_at] = stub_lines
          with open('pubspec.yaml', 'w') as f:
              f.writelines(lines)
          print('pubspec.yaml patched with web stubs')
          PYEOF

      - name: Stub native-only Dart pub-cache files
        run: |
          python3 << 'PYEOF'
          import os, glob
          pub_cache = os.path.expanduser('~/.pub-cache/hosted/pub.dev')
          count = 0
          rust_stub = ('// Web stub\n'
              'void initializeRustLibWatchtower() {}\n'
              'void initializeRustLibWatchtowerFull({dynamic staticLib}) {}\n')
          for path in glob.glob(f'{pub_cache}/rust_lib_watchtower-*/lib/*.dart'):
              with open(path, 'w') as f:
                  f.write(rust_stub)
              print(f'Stubbed rust: {os.path.basename(path)}')
              count += 1
          qjs_stub = ('// Web stub\n'
              'class FlutterQjs { static void setUp({dynamic maxStack, dynamic memLimit}) {} }\n'
              'class QjsEngine { dynamic evaluate(String s) => null; void dispose() {} '
              'void setModuleHandler(dynamic h) {} void setHostPromiseRejectionHandler(dynamic h) {} }\n')
          for path in glob.glob(f'{pub_cache}/flutter_qjs-*/lib/*.dart'):
              with open(path, 'w') as f:
                  f.write(qjs_stub)
              print(f'Stubbed qjs: {os.path.basename(path)}')
              count += 1
          drift_stub = ('// Web stub\n'
              'import \'package:drift/drift.dart\';\n'
              'class NativeDatabase {\n'
              '  static dynamic open(dynamic f, {dynamic setup, bool logStatements=false}) => throw UnimplementedError();\n'
              '  static dynamic inMemory({dynamic setup}) => throw UnimplementedError();\n'
              '  static dynamic createInBackground(dynamic f, {dynamic setup, bool logStatements=false, String? cacheName}) => throw UnimplementedError();\n'
              '}\n')
          for path in glob.glob(f'{pub_cache}/drift-*/lib/native.dart'):
              with open(path, 'w') as f:
                  f.write(drift_stub)
              print(f'Stubbed drift: {os.path.basename(path)}')
              count += 1
          print(f'Total stubbed: {count} files')
          PYEOF

      - name: Patch pseudom CSSParser for dart2js
        run: |
          FILE=$(find ~/.pub-cache -name 'CSSParser.dart' -path '*/pseudom*' 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/& -3765256679076942294/& 0/g' "$FILE"
            sed -i 's/& 4626330031550017026/& 0/g' "$FILE"
            sed -i 's/& 5779244251887978624/& 0/g' "$FILE"
            sed -i 's/& -4597022382133018102/& 0/g' "$FILE"
            sed -i 's/& -4022278413737085706/& 0/g' "$FILE"
            echo 'Patched CSSParser.dart'
          fi

      - name: Patch large int literals in .g.dart files (dart2js JS-safe)
        run: |
          python3 << 'PYEOF'
          # dart2js rejects integer literals > 2^53 - 1 (JavaScript Number precision).
          # Isar-generated .g.dart files store 64-bit xxh3 collection IDs as const int
          # literals.  On web we use MockIsar which never reads these IDs, so replacing
          # them with 0 is safe.  We must do this BEFORE flutter build web.
          import re, glob

          JS_MAX = 9007199254740991  # 2^53 - 1

          def replace_fn(m):
              try:
                  val = int(m.group(1))
                  if val > JS_MAX:
                      return '0'
              except ValueError:
                  pass
              return m.group(0)

          patched = 0
          for path in glob.glob('lib/**/*.g.dart', recursive=True):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              # Match standalone positive integer literals (not inside strings/comments).
              # Negative literals are -<literal>; the literal part is what triggers the
              # error, so patching the positive literal to 0 makes -0 == 0.
              new = re.sub(r'\b(\d{10,})\b', replace_fn, content)
              if new != content:
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(new)
                  print(f'Patched: {path}')
                  patched += 1
          print(f'Total .g.dart files patched: {patched}')
          PYEOF

      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons --base-href /watchtower/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify ntfy (build FAILED)
        if: failure()
        run: |
          curl -s -X POST https://ntfy.sh/watchtower \
            -H "Title: Build Web FAIL" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light" \
            -d "Web build FAILED — sha ${{ github.sha }} — ${{ github.event.head_commit.message }}" || true

      - name: Notify ntfy (build SUCCESS)
        if: success()
        run: |
          curl -s -X POST https://ntfy.sh/watchtower \
            -H "Title: Build Web OK" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -d "Web deployed → ${{ steps.deploy.outputs.page_url }} — sha ${{ github.sha }}" || true
