plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.watchtower.app"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.watchtower.app"
        minSdkVersion flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging false
        }
    }

    signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
       }
       // Stable keystore decoded from the KEYSTORE_B64 GitHub secret so every
       // CI build is signed with the same identity (PKCS12 format, generated once).
       // Allows in-place upgrade of debug/profile APKs without signature conflict.
       watchtower {
           keyAlias 'watchtower'
           keyPassword 'watchtower'
           storeFile file('watchtower-debug.keystore')
           storePassword 'watchtower'
           storeType 'PKCS12'
       }
   }
   buildTypes {
       release {
           signingConfig signingConfigs.watchtower
           minifyEnabled true
           shrinkResources true
           proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
       }
       profile {
           // Plugin AARs generally only publish debug/release variants; without
           // this, Gradle resolves "profile" inconsistently across dependencies
           // and R8 sees plugin classes as missing (cascading "Missing class"
           // errors one plugin at a time as each gets processed).
           matchingFallbacks = ['release']
           signingConfig signingConfigs.watchtower
           minifyEnabled true
           shrinkResources true
           proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
       }
       debug {
           signingConfig signingConfigs.watchtower
           minifyEnabled false
           shrinkResources false
       }
   }
   splits {
       abi {
           enable true
           reset()
           include "arm64-v8a", "x86_64"
           universalApk true
       }
   }
   repositories {
        flatDir {
            dirs 'libs'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation(name: 'libmtorrentserver', ext: 'aar')
    implementation 'dev.rikka.shizuku:api:13.1.5'
    implementation 'dev.rikka.shizuku:provider:13.1.5'

    // ── Inline Dalvik bridge ─────────────────────────────────────────────────
    // Coroutines: call Kotlin suspend functions from extension APKs via reflection
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    // OkHttp: provided to extension APKs via parent ClassLoader (NetworkHelper)
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
