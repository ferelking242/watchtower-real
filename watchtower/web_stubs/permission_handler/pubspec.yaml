name: permission_handler
description: "Cross-platform stub: web always-granted shim, Android real OS dialogs via PermissionHandlerPlugin MethodChannel."
version: 12.0.1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler_android: ^12.1.0

flutter:
  plugin:
    platforms:
      android:
        default_package: permission_handler_android
