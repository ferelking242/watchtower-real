plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.watchtower.reel"
    compileSdkVersion 36
    ndkVersion "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.watchtower.reel"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        reel {
            // Keystore permanent stocké en secret GitHub (KEYSTORE_BASE64)
            // storeFile défini dynamiquement dans le workflow CI
            keyAlias        System.getenv("KEY_ALIAS")      ?: 'reel'
            keyPassword     System.getenv("KEY_PASSWORD")   ?: 'reelwatchtower'
            storePassword   System.getenv("STORE_PASSWORD") ?: 'reelwatchtower'
            storeFile       file(System.getenv("KEYSTORE_PATH") ?: 'reel.keystore')
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.reel
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        profile {
            matchingFallbacks = ['release']
            signingConfig signingConfigs.reel
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.reel
        }
    }

    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "x86_64"
            universalApk false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
