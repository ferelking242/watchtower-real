name: reel
description: Reel — UI TikTok-style pour Watchtower. Fusionne dans watchtower/lib/ui/tiktok/.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management — mêmes versions que watchtower ────────────────────────
  flutter_riverpod: ^3.1.0
  riverpod:          ^3.1.0
  hooks_riverpod:    ^3.0.0
  flutter_hooks:     ^0.21.0

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^17.2.0

  # ── Watchtower SDK — client officiel (retry, auth, modèles typés) ────────────
  watchtower_client:
    git:
      url: https://github.com/ferelking242/watchtower-sdk-dart.git
      ref: main

  # ── Network ──────────────────────────────────────────────────────────────────
  http: ^1.6.0

  # ── Storage — même stack que watchtower ──────────────────────────────────────
  hive:         ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5

  # ── Video — même fork media_kit que watchtower ───────────────────────────────
  media_kit:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: media_kit
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe
  media_kit_video:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: media_kit_video
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe
  media_kit_libs_video:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: libs/universal/media_kit_libs_video
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe

  # ── UI ───────────────────────────────────────────────────────────────────────
  flex_color_scheme:    ^8.3.1
  cached_network_image: ^3.3.1
  skeletonizer:         ^2.1.0+1
  shimmer:              ^3.0.0
  marquee:              ^2.2.3
  cupertino_icons:      ^1.0.9

  # ── Utils ────────────────────────────────────────────────────────────────────
  path_provider:    ^2.1.5
  package_info_plus: ^9.0.1
  intl:             ^0.20.2

dependency_overrides:
  # Force tous les packages media_kit à utiliser exactement le même commit.
  # Sans ça, media_kit_video résout media_kit à HEAD → conflit avec notre pin.
  media_kit:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: media_kit
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe
  media_kit_video:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: media_kit_video
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe
  media_kit_libs_video:
    git:
      url: https://github.com/kodjodevf/media-kit.git
      path: libs/universal/media_kit_libs_video
      ref: f5796d287b642548e7e703bbc592f01dd7b1befe

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # build_runner et générateurs retirés : pas de codegen actif dans watchtower-real.
  # Les ajouter uniquement quand on utilisera @riverpod ou @IsarCollection.

flutter:
  uses-material-design: true
